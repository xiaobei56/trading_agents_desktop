name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            runner_label: macOS
            target_name: macos-arm64
            artifact_name: TradingAgentsDesktop-macos-arm64
            archive_path: dist/TradingAgentsDesktop-macos-arm64.zip
            package_path: dist/macos/TradingAgentsDesktop.app
            build_cmd: ./scripts/build_desktop_mac.sh
            archive_cmd: ditto -c -k --sequesterRsrc --keepParent "dist/macos/TradingAgentsDesktop.app" "dist/TradingAgentsDesktop-macos-arm64.zip"
          - os: windows-latest
            runner_label: Windows
            target_name: windows-x64
            artifact_name: TradingAgentsDesktop-windows-x64
            archive_path: dist/TradingAgentsDesktop-windows-x64.zip
            package_path: dist/windows/TradingAgentsDesktop
            build_cmd: .\scripts\build_desktop_windows.ps1
            archive_cmd: Compress-Archive -Path "dist/windows/TradingAgentsDesktop" -DestinationPath "dist/TradingAgentsDesktop-windows-x64.zip" -Force

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Build desktop app (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: ${{ matrix.build_cmd }}

      - name: Build desktop app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.build_cmd }}

      - name: Archive build output (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: ${{ matrix.archive_cmd }}

      - name: Archive build output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.archive_cmd }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_path }}
          if-no-files-found: error

  release:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release-assets

      - name: Inspect release assets
        shell: bash
        run: find dist/release-assets -maxdepth 3 -type f | sort

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release-assets/TradingAgentsDesktop-macos-arm64/TradingAgentsDesktop-macos-arm64.zip
            dist/release-assets/TradingAgentsDesktop-windows-x64/TradingAgentsDesktop-windows-x64.zip
